<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPTEL Mock Test Platform</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --correct: #10b981;
            --wrong: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #test-screen {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            #test-screen { grid-template-columns: 1fr; }
        }
        .options-container label {
            display: block;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .options-container label:hover {
            background-color: #e5e7eb;
        }
        input[type="radio"] { margin-right: 10px; }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
        }
        .nav-btn {
            padding: 10px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-btn.answered { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.active { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.4); }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        .review-item {
            border-left: 5px solid gray;
            padding-left: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .review-item.correct { border-left-color: var(--correct); }
        .review-item.wrong { border-left-color: var(--wrong); }
        .review-option { margin: 5px 0; padding: 8px; border-radius: 4px; }
        .bg-correct { background-color: #d1fae5; color: #065f46; font-weight: bold;}
        .bg-wrong { background-color: #fee2e2; color: #991b1b; }
        .explanation {
            background: #eef2ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="card">
        <h1>Introduction to IoT Mock Test</h1>
        <p>This test will pull 70 random questions from Weeks 1-12. If fewer than 70 questions are available, it will use all available questions.</p>
        <button onclick="startTest()">Start Test</button>
    </div>

    <div id="test-screen" style="display: none;">
        <div class="card">
            <h2 id="question-number">Question 1</h2>
            <p id="question-text" style="font-size: 1.1em; font-weight: 500;"></p>
            <div id="options" class="options-container"></div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 30px;">
                <button onclick="prevQuestion()" id="prev-btn">Previous</button>
                <button onclick="nextQuestion()" id="next-btn">Next</button>
            </div>
        </div>

        <div class="card">
            <h3>Question Palette</h3>
            <div id="nav-grid" class="nav-grid"></div>
            <button onclick="submitTest()" style="width: 100%; margin-top: 20px; background: #10b981;">Submit Test</button>
        </div>
    </div>

    <div id="result-screen" class="card" style="display: none;">
        <h1>Test Analysis</h1>
        <h2 id="score-display"></h2>
        <div id="review-container"></div>
        <button onclick="location.reload()">Take Another Test</button>
    </div>
</div>

<script>
    const jsonFiles = ['week1.json', 'week2.json', 'week3.json', 'week4.json', 'week5.json', 'week6.json', 'week7.json', 'week8.json', 'week9.json', 'week10.json', 'week11.json', 'week12.json'];
    
    let allQuestions = [];
    let testQuestions = [];
    let userAnswers = {}; 
    let currentIndex = 0;

    async function loadData() {
        allQuestions = [];
        for (let file of jsonFiles) {
            try {
                const response = await fetch(file);
                if (response.ok) {
                    const data = await response.json();
                    if (data.questions && Array.isArray(data.questions)) {
                        allQuestions.push(...data.questions);
                    }
                }
            } catch (error) {
                console.warn("Could not load:", file);
            }
        }
    }

    async function startTest() {
        const startBtn = document.querySelector('#start-screen button');
        startBtn.disabled = true;
        startBtn.innerText = "Loading...";

        await loadData();

        if (allQuestions.length === 0) {
            alert("Error: No questions loaded. Ensure JSON files are in the same folder.");
            startBtn.disabled = false;
            startBtn.innerText = "Start Test";
            return;
        }

        // Shuffle and select max 70 questions
        testQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 70);
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'grid';
        
        buildNavGrid();
        renderQuestion(0);
    }

    function buildNavGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        for (let i = 0; i < testQuestions.length; i++) {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = i + 1;
            btn.id = `nav-btn-${i}`;
            btn.onclick = () => renderQuestion(i);
            grid.appendChild(btn);
        }
    }

    function renderQuestion(index) {
        currentIndex = index;
        const q = testQuestions[index];
        
        document.getElementById('question-number').innerText = `Question ${index + 1} of ${testQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        // Loop through the options object (a, b, c, d)
        Object.entries(q.options).forEach(([key, value]) => {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'option';
            radio.value = key;
            
            if (userAnswers[index] === key) {
                radio.checked = true;
            }
            
            radio.onchange = () => {
                userAnswers[index] = key;
                document.getElementById(`nav-btn-${index}`).classList.add('answered');
            };
            
            label.appendChild(radio);
            label.appendChild(document.createTextNode(`${key}. ${value}`));
            optionsDiv.appendChild(label);
        });

        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`nav-btn-${index}`).classList.add('active');

        document.getElementById('prev-btn').disabled = (index === 0);
        document.getElementById('next-btn').disabled = (index === testQuestions.length - 1);
    }

    function prevQuestion() { if (currentIndex > 0) renderQuestion(currentIndex - 1); }
    function nextQuestion() { if (currentIndex < testQuestions.length - 1) renderQuestion(currentIndex + 1); }

    function submitTest() {
        if (!confirm("Are you sure you want to submit?")) return;
        
        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        generateReview();
    }

    function generateReview() {
        const container = document.getElementById('review-container');
        container.innerHTML = '';
        let score = 0;

        testQuestions.forEach((q, index) => {
            const userChoice = userAnswers[index];
            const isCorrect = (userChoice === q.correct_answer);
            
            if (isCorrect) score++;

            const item = document.createElement('div');
            item.className = `review-item ${isCorrect ? 'correct' : 'wrong'}`;
            
            let html = `<h3>${index + 1}. ${q.question}</h3>`;
            
            Object.entries(q.options).forEach(([key, value]) => {
                let optClass = "review-option";
                
                if (key === q.correct_answer) {
                    optClass += " bg-correct";
                } else if (userChoice === key && !isCorrect) {
                    optClass += " bg-wrong";
                }
                
                const userTag = (userChoice === key) ? " <strong>(Your Answer)</strong>" : "";
                html += `<div class="${optClass}">${key}. ${value}${userTag}</div>`;
            });

            html += `<div class="explanation"><strong>Explanation:</strong> ${q.explanation || "No explanation provided."}</div>`;
            item.innerHTML = html;
            container.appendChild(item);
        });

        document.getElementById('score-display').innerText = `Final Score: ${score} / ${testQuestions.length}`;
    }
</script>

</body>
</html>
